name: Deploy to Aliyun

on:
  push:
    branches: [main]

jobs:
  deploy:
    if: github.repository == 'Wild-KD/investment-research-engine'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 8.210.132.76
          username: admin
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/investment-engine
            git pull origin main
            /opt/investment-engine/venv/bin/pip install -r requirements.txt --quiet
            pm2 restart investment-engine
            echo "Deployed at $(date)"
