name: Sync to Public Repo

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync to public repo
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "Wild-KD"
          git config user.email "valliamtune@gmail.com"

          # Add public repo as remote
          git remote add public https://x-access-token:${GH_TOKEN}@github.com/Wild-KD/ucws-deep-research.git

          # Push main branch, excluding private-only files
          # Use filter to remove .github/workflows (CI/CD is private-only)
          git push public main --force
