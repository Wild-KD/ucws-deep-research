name: Sync to Public Repo

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to public repo via HTTPS
        run: |
          git remote add public https://Wild-KD:${{ secrets.GH_PAT }}@github.com/Wild-KD/ucws-deep-research.git
          git push public main --force
