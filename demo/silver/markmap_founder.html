// ===== RENDER =====
const { Transformer } = window.markmap;
const { Markmap } = window.markmap;
const transformer = new Transformer();
const opts = { color: () => '#999', colorFreezeLevel: 0, initialExpandLevel: -1, maxWidth: 420, paddingX: 14 };

function render(svgId, md) {
  const { root } = transformer.transform(md);
  return Markmap.create('#'+svgId, opts, root);
}

function rerender(mmObj, svgId, md) {
  const { root } = transformer.transform(md);
  mmObj.setData(root);
  mmObj.fit();
}

// ===== STATE =====
let curTab = 0;
let showK = true;
let curLang = 'zh';  // 'zh' or 'en'

// Lazy render: only create markmap when its SVG is first visible
const mm0a = render('s0a', mdOrig);
let mm1a = null;  // 逻辑重组+常识
let mm1b = null;  // 逻辑重组-常识

// Store Chinese text for legend spans (to restore when switching back)
const legendZh = {};
document.querySelectorAll('.legend > span[data-en]').forEach(function(el) {
  legendZh[el.getAttribute('data-en')] = el.innerHTML;
});

function getOriginalMd() { return curLang === 'en' ? mdOrigEn : mdOrig; }
function getReorgMd(wk) { return curLang === 'en' ? mkReorgEn(wk) : mkReorg(wk); }

function ensureCurrentRendered() {
  if (curTab === 1 && showK && !mm1a) {
    document.getElementById('s1a').classList.remove('off');
    document.getElementById('s1b').classList.add('off');
    mm1a = render('s1a', getReorgMd(true));
  }
  if (curTab === 1 && !showK && !mm1b) {
    document.getElementById('s1b').classList.remove('off');
    document.getElementById('s1a').classList.add('off');
    mm1b = render('s1b', getReorgMd(false));
  }
}

function swTab(n) {
  curTab = n;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('on', i===n));
  document.getElementById('w0').style.display = n===0 ? '' : 'none';
  document.getElementById('w1').style.display = n===1 ? '' : 'none';
  if (n===1) {
    document.getElementById('s1a').classList.toggle('off', !showK);
    document.getElementById('s1b').classList.toggle('off', showK);
    ensureCurrentRendered();
  }
  setTimeout(function() { fitCurrent(); }, 100);
  setTimeout(function() { fitCurrent(); }, 300);
  setTimeout(function() { fitCurrent(); }, 600);
}

function toggleK() {
  showK = !showK;
  var btn = document.getElementById('toggleBtn');
  if (curLang === 'en') {
    btn.textContent = showK ? btn.getAttribute('data-en-on') : btn.getAttribute('data-en-off');
  } else {
    btn.textContent = showK ? btn.getAttribute('data-zh-on') : btn.getAttribute('data-zh-off');
  }
  btn.classList.toggle('active', showK);
  document.getElementById('s1a').classList.toggle('off', !showK);
  document.getElementById('s1b').classList.toggle('off', showK);
  ensureCurrentRendered();
  setTimeout(function() { fitCurrent(); }, 100);
  setTimeout(function() { fitCurrent(); }, 300);
}

function fitCurrent() {
  if (curTab===0) mm0a.fit();
  else if (showK && mm1a) mm1a.fit();
  else if (!showK && mm1b) mm1b.fit();
}

// ===== LANGUAGE SWITCHING =====
function applyLang(lang) {
  curLang = lang;
  var isEn = (lang === 'en');
  document.documentElement.lang = isEn ? 'en' : 'zh-CN';

  // Update h1
  var h1 = document.querySelector('.header h1');
  if (isEn) {
    if (!h1.getAttribute('data-zh')) h1.setAttribute('data-zh', h1.textContent);
    h1.textContent = h1.getAttribute('data-en');
  } else {
    h1.textContent = h1.getAttribute('data-zh') || h1.textContent;
  }

  // Update tabs
  document.querySelectorAll('.tab[data-en]').forEach(function(el) {
    if (isEn) {
      if (!el.getAttribute('data-zh')) el.setAttribute('data-zh', el.textContent);
      el.textContent = el.getAttribute('data-en');
    } else {
      el.textContent = el.getAttribute('data-zh') || el.textContent;
    }
  });

  // Update toggle button
  var btn = document.getElementById('toggleBtn');
  if (isEn) {
    btn.textContent = showK ? btn.getAttribute('data-en-on') : btn.getAttribute('data-en-off');
  } else {
    btn.textContent = showK ? btn.getAttribute('data-zh-on') : btn.getAttribute('data-zh-off');
  }

  // Update legend items
  document.querySelectorAll('.legend > span[data-en]').forEach(function(el) {
    var enKey = el.getAttribute('data-en');
    if (isEn) {
      // Keep the ldot span, replace text
      var dot = el.querySelector('.ldot');
      el.textContent = '';
      if (dot) el.appendChild(dot);
      el.appendChild(document.createTextNode(enKey));
    } else {
      // Restore full Chinese innerHTML (includes ldot)
      if (legendZh[enKey]) el.innerHTML = legendZh[enKey];
    }
  });

  // Re-render all existing markmaps with new language content
  rerender(mm0a, 's0a', getOriginalMd());
  if (mm1a) rerender(mm1a, 's1a', getReorgMd(true));
  if (mm1b) rerender(mm1b, 's1b', getReorgMd(false));
  setTimeout(function() { fitCurrent(); }, 100); setTimeout(function() { fitCurrent(); }, 300); setTimeout(function() { fitCurrent(); }, 600);
}

// ===== LANG.JS INTEGRATION =====
window.onResearchLangChange = function(lang) {
  applyLang(lang);
};
</script>
