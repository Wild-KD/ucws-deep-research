/* ========== Chinese Reorganized content ========== */

/* ========== English Reorganized content ========== */

/* ========== Markmap rendering ========== */
const { Transformer, Markmap } = window.markmap;
const transformer = new Transformer();
const opts = { color: () => '#999', colorFreezeLevel: 0, initialExpandLevel: -1, maxWidth: 420, paddingX: 14 };

let curLang = 'zh';
let mm0, mm1a, mm1b;

function getOrigMd(lang) { return lang === 'en' ? mdOrig_en : mdOrig_zh; }
function getReorgMd(lang, withK) { return lang === 'en' ? mkReorg_en(withK) : mkReorg_zh(withK); }

function renderAll() {
  /* Clear existing SVG children before re-rendering */
  document.getElementById('s0').innerHTML = '';
  document.getElementById('s1a').innerHTML = '';
  document.getElementById('s1b').innerHTML = '';
  mm0 = Markmap.create('#s0', opts, transformer.transform(getOrigMd(curLang)).root);
  mm1a = Markmap.create('#s1a', opts, transformer.transform(getReorgMd(curLang, true)).root);
  mm1b = Markmap.create('#s1b', opts, transformer.transform(getReorgMd(curLang, false)).root);
  /* Fit the currently visible map */
  requestAnimationFrame(function() {
    if (curTab === 0) mm0.fit();
    else if (showK) mm1a.fit();
    else mm1b.fit();
  });
}

/* Initial render */
renderAll();

let curTab = 0, showK = true;
function swTab(n) {
  curTab = n;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('on', i===n));
  document.getElementById('c0').style.display = n===0 ? '' : 'none';
  document.getElementById('c1').style.display = n===1 ? '' : 'none';
  if(n===0) mm0.fit(); else if(showK) mm1a.fit(); else mm1b.fit();
}

function updateToggleBtnText() {
  var btn = document.getElementById('toggleBtn');
  if (curLang === 'en') {
    btn.textContent = showK ? 'Knowledge: Shown' : 'Knowledge: Hidden';
  } else {
    btn.textContent = showK ? '常识: 显示中' : '常识: 已隐藏';
  }
}

function toggleK() {
  showK = !showK;
  updateToggleBtnText();
  document.getElementById('toggleBtn').classList.toggle('active', showK);
  document.getElementById('s1a').classList.toggle('off', !showK);
  document.getElementById('s1b').classList.toggle('off', showK);
  if(curTab===1) { if(showK) mm1a.fit(); else mm1b.fit(); }
}

/* ---------- Language change callback ---------- */
window.onResearchLangChange = function(lang) {
  curLang = (lang === 'en') ? 'en' : 'zh';
  renderAll();
  updateToggleBtnText();
  /* The toggle button also has data-en, but since we manage its text
     dynamically based on showK state, we override after lang.js applies: */
  var btn = document.getElementById('toggleBtn');
  if (curLang === 'en') {
    btn.textContent = showK ? 'Knowledge: Shown' : 'Knowledge: Hidden';
  } else {
    btn.textContent = showK ? '常识: 显示中' : '常识: 已隐藏';
  }
};
