function decodeHtml(html) { var el = document.createElement('div'); el.innerHTML = html; return el.textContent || ''; }
function findContent(obj, d) { if (!obj||d>5) return ''; if (obj.content) return obj.content; if (obj.v) return obj.v; if (obj.data) return findContent(obj.data,d+1); return ''; }
function hasKids(obj) { return (obj.children&&obj.children.length>0)||(obj.data&&obj.data.children&&obj.data.children.length>0); }
function getNodeColor(node) {
  var raw = findContent(node,0), text = decodeHtml(raw.replace(/<[^>]*>/g,''));
  if (text.includes('常识') || text.includes('Knowledge')) return B;
  if (text.includes('注:') || text.includes('Note:')) return B;
  for (var i=0;i<verifyColors.length;i++) { if (text.includes(verifyColors[i][0])) return verifyColors[i][1]; }
  if (hasKids(node)) return B;
  return Y;
}

const { Transformer, Markmap } = window.markmap;

function buildMarkmap(svgId, md) {
  const { root } = transformer.transform(md);
  return Markmap.create('#' + svgId, {
    color: getNodeColor,
    colorFreezeLevel: 0,
    initialExpandLevel: -1,
    maxWidth: 420,
    paddingX: 14
  }, root);
}

// Active workpapers based on language
function getWorkpapers() { return curLang() === 'en' ? workpapers_en : workpapers_zh; }

function showWorkpaper(text) {
  var decoded = decodeHtml(text.replace(/<[^>]*>/g,''));
  var workpapers = getWorkpapers();
  var found = null;
  for (var kw in workpapers) { if (decoded.includes(kw)) { found = workpapers[kw]; break; } }
  var panel = document.getElementById('wpanel');
  if (!found) { panel.style.display='none'; return; }
  var h = '<span class="wp-close" onclick="document.getElementById(\'wpanel\').style.display=\'none\'">&#x2715;</span>';
  if (found.structured) {
    h += '<div class="wp-title">'+found.claim+'</div>';
    h += '<div class="wp-verdict" style="padding:6px 8px;background:#f0f8f0;border-radius:4px">'+found.conclusion+'</div>';
    found.subclaims.forEach(function(sc,i){
      var bc = sc.status==='🟢'?G:sc.status==='🟡'?Y:R;
      var did = 'sc'+i;
      h += '<div style="margin-top:8px;border-left:3px solid '+bc+';border-radius:4px">';
      h += '<div onclick="var e=document.getElementById(\''+did+'\');e.style.display=e.style.display===\'none\'?\'block\':\'none\'" style="cursor:pointer;padding:6px 8px;background:#f9f9f9;font-weight:600;font-size:11px">'+sc.status+' '+sc.text+' &#x25BC;</div>';
      h += '<div id="'+did+'" style="display:none;padding:6px 8px"><div class="wp-finding">'+sc.finding+'</div>';
      if(sc.sources) sc.sources.forEach(function(s){ h += '<div class="wp-src">&bull; '+(s.url?'<a href="'+s.url+'" target="_blank">'+s.title+'</a>':s.title)+' &mdash; <i>'+s.author+'</i></div>'; });
      h += '</div></div>';
    });
  }
  panel.innerHTML = h; panel.style.display = 'block';
}

function attachNodeListeners() {
  document.querySelectorAll('g.markmap-node').forEach(function(g){
    g.style.cursor='pointer';
    g.addEventListener('click',function(e){
      var fo=g.querySelector('foreignObject');
      if(fo) showWorkpaper(fo.innerHTML);
      e.stopPropagation();
    });
  });
}
setTimeout(attachNodeListeners, 1500);

// ===== Language switch: re-render markmap =====
function reRenderForLang() {
  var root = transformer.transform(mkMd()).root;
  mm.setData(root);
  setTimeout(function() { mm.fit(); }, 100);
  // Close workpaper panel on lang switch
  document.getElementById('wpanel').style.display = 'none';
  // Re-attach click listeners
  setTimeout(attachNodeListeners, 600);
}

// Override toggleLang from lang.js to also re-render markmap
var _origToggleLang = null;
var _langObserver = setInterval(function() {
  if (window.toggleLang && !_origToggleLang) {
    _origToggleLang = window.toggleLang;
    window.toggleLang = function() {
      _origToggleLang();
      reRenderForLang();
    };
    clearInterval(_langObserver);
  }
}, 100);
</script>
