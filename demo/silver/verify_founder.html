const workpapers = {

    subclaims:[{text:'事实: 58.5%和17%是否准确?',status:'🟡',
      finding:'Silver Institute WSS 2025: 工业需求680.5Moz÷总需求1160Moz=58.7%, 接近58.5%。PV需求197.6Moz=17.0%, 匹配。',
      quote:'',

  '8千万': {color:'🟡',claim:'供需缺口已近8千万盎司/年',structured:true,

      quote:'',

  '819.7': {color:'🟡',claim:'矿产银产量+0.9%至819.7百万盎司; 总产量~3万吨',structured:true,

      quote:'',
      sources:[{title:'Global Silver ETP Holdings Chart',author:'MiningVisuals',url:'https://www.miningvisuals.com/post/charted-the-growth-of-global-silver-etp-holdings-2016-2026'}]}]},

      quote:'',

      quote:'',
      sources:[{title:'2024年白银供需数据报道',author:'CCTV经济频道, 2025.10.20',url:'https://jingji.cctv.com/2025/10/20/ARTIN81qvFG5TZHB2OzBxocG251019.shtml'}]}]},

  '出口许可证': {color:'🟡',claim:'2026.1.1起中国实施出口许可证审批制度',structured:true,
    conclusion:'🟡 事实正确, 但是"继续"非新政(自2019年起已实施)',
    subclaims:[{text:'事实: 政策是否存在?',status:'🟢',
      finding:'商务部公告2025年第69号确认。但原文用"继续"——自2019年起已实施, 每年例行续期。',
      quote:'',
      sources:[{title:'商务部公告2025年第69号',author:'商务部, 2025.10.29',url:'https://www.mofcom.gov.cn/zcfb/dwmygl/art/2025/art_d939f5e193604b1aaf76aacc441a16f4.html'}]}]},
};

function decodeHtml(html) { var el = document.createElement('div'); el.innerHTML = html; return el.textContent || ''; }
function findContent(obj, d) { if (!obj||d>5) return ''; if (obj.content) return obj.content; if (obj.v) return obj.v; if (obj.data) return findContent(obj.data,d+1); return ''; }
function hasKids(obj) { return (obj.children&&obj.children.length>0)||(obj.data&&obj.data.children&&obj.data.children.length>0); }
function getNodeColor(node) {
  var raw = findContent(node,0), text = decodeHtml(raw.replace(/<[^>]*>/g,''));
  if (text.includes('常识')) return B;
  if (text.includes('注:')) return B;
  for (var i=0;i<verifyColors.length;i++) { if (text.includes(verifyColors[i][0])) return verifyColors[i][1]; }
  if (hasKids(node)) return B;
  return Y;
}

const md = `
# 白银回调风险大于黄金, 长期看好, 短期波动需警惕 *(方正证券 2026.1.23)*

## 去美元化趋势下白银双重属性使其同时受益于金融和工业需求

### 去美元化推动贵金属偏好超过美债
- <span style="color:${BLUE};font-weight:bold">全球"去美元化"推进, 投资者对贵金属偏好似乎超过了美债</span><br>*(方正引用前期报告)*

### 白银金融属性偏弱但工业属性更强
- <span style="color:${BLUE};font-weight:bold">白银与黄金相关系数~80%, 工业需求占比超50%; 市场容量2.6万亿美元仅为黄金5.9万亿的44%</span><br>*(世界白银协会)*

##### 矿产银产量受限
- <span style="color:${BLUE};font-weight:bold">全球白银总年产量稳定在3万吨左右; 2024年矿产银产量同比+0.9%至819.7百万盎司</span><br>*(世界白银协会)*

##### 再生银增长但总量有限
- <span style="color:${BLUE};font-weight:bold">2024年白银回收量同比增长6%, 达近12年最高值, 占总供应约20%</span><br>*(世界白银协会)*

#### 需求端: 工业需求主导, ETF加剧紧张

##### 工业需求占总需求58.5%, 光伏是最大增量
- <span style="color:${BLUE};font-weight:bold">2024年工业白银需求占总需求58.5%, 珠宝17.9%, 实物投资16.4%; 光伏占需求总量17%</span><br>*(世界白银协会)*

##### ETF增仓抽离实物加剧短缺
- <span style="color:${BLUE};font-weight:bold">白银ETF持仓从6亿盎司攀升至7.5亿盎司以上, 期货溢价约7%</span><br>*(方正引用SLV/PSLV数据)*

- <span style="color:${BLUE};font-weight:bold">2000年以来金银比三次达到峰值(2003年82, 2008年80+, 2020年122), 每次后白银均强劲反弹</span><br>*(方正历史数据)*

#### ⚠ 2008年警示: 极端流动性危机下白银先崩再涨
- <span style="color:${BLUE};font-weight:bold">2008年次贷危机中金银比冲至80+, 但白银先从21美元暴跌至9美元(跌幅近60%), 之后才反弹</span><br>*(方正历史数据)*

### 中国供给严重不足且出口管制加剧国际紧张
- <span style="color:${BLUE};font-weight:bold">2024年中国白银产量(矿产+再生)共4659吨, 工业需求单项8567吨; 2026.1.1起实施出口许可证</span><br>*(同花顺/方正; 商务部)*

## 前瞻: 长期看多但短期需警惕深度回调

### 长期: 工业需求刚性增长支撑银价
- <span style="color:#008800;font-weight:bold">工业需求长期刚性增长为白银价格提供核心支撑</span><br>*(方正分析)*

### ⚠ 数据口径注意
- <span style="color:#999">[注: 本报告工业需求占比在核心结论写"50-60%", 正文写"58.5%", 口径不完全一致]</span><br>*(编者注)*

const { Transformer, Markmap } = window.markmap;
const transformer = new Transformer();
Markmap.create('#mm', { color: getNodeColor, colorFreezeLevel: 0, initialExpandLevel: -1, maxWidth: 420, paddingX: 14 }, transformer.transform(md).root);

function showWorkpaper(text) {
  var decoded = decodeHtml(text.replace(/<[^>]*>/g,''));
  var found = null;
  for (var kw in workpapers) { if (decoded.includes(kw)) { found = workpapers[kw]; break; } }
  var panel = document.getElementById('wpanel');
  if (!found) { panel.style.display='none'; return; }
  var h = '<span class="wp-close" onclick="document.getElementById(\'wpanel\').style.display=\'none\'">✕</span>';
  if (found.structured) {
    h += '<div class="wp-title">'+found.claim+'</div>';
    h += '<div class="wp-verdict" style="padding:6px 8px;background:#f0f8f0;border-radius:4px">'+found.conclusion+'</div>';
    found.subclaims.forEach(function(sc,i){
      var bc = sc.status==='🟢'?G:sc.status==='🟡'?Y:R;
      var did = 'sc'+i;
      h += '<div style="margin-top:8px;border-left:3px solid '+bc+';border-radius:4px">';
      h += '<div onclick="var e=document.getElementById(\''+did+'\');e.style.display=e.style.display===\'none\'?\'block\':\'none\'" style="cursor:pointer;padding:6px 8px;background:#f9f9f9;font-weight:600;font-size:11px">'+sc.status+' '+sc.text+' ▼</div>';
      h += '<div id="'+did+'" style="display:none;padding:6px 8px"><div class="wp-finding">'+sc.finding+'</div>';
      if(sc.sources) sc.sources.forEach(function(s){ h += '<div class="wp-src">• '+(s.url?'<a href="'+s.url+'" target="_blank">'+s.title+'</a>':s.title)+' — <i>'+s.author+'</i></div>'; });
      h += '</div></div>';
    });
  }
  panel.innerHTML = h; panel.style.display = 'block';
}
setTimeout(function(){ document.querySelectorAll('g.markmap-node').forEach(function(g){ g.style.cursor='pointer'; g.addEventListener('click',function(e){ var fo=g.querySelector('foreignObject'); if(fo)showWorkpaper(fo.innerHTML); e.stopPropagation(); }); }); },1500);
</script>
