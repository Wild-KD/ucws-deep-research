// Current language helper
function curLang() { return localStorage.getItem('research-engine-lang') || 'en'; }
function getMd() { return curLang() === 'en' ? md_en() : md_zh(); }

function decodeHtml(html) { var el = document.createElement('div'); el.innerHTML = html; return el.textContent || ''; }
function findContent(obj, d) { if (!obj||d>5) return ''; if (obj.content) return obj.content; if (obj.v) return obj.v; if (obj.data) return findContent(obj.data,d+1); return ''; }
function hasKids(obj) { return (obj.children&&obj.children.length>0)||(obj.data&&obj.data.children&&obj.data.children.length>0); }
function getNodeColor(node) {
  var raw = findContent(node,0), text = decodeHtml(raw.replace(/<[^>]*>/g,''));
  if (text.includes('常识') || text.includes('Knowledge')) return B;
  for (var i=0;i<verifyColors.length;i++) { if (text.includes(verifyColors[i][0])) return verifyColors[i][1]; }
  if (hasKids(node)) return B;
  return Y;
}

const { Transformer, Markmap } = window.markmap;
const transformer = new Transformer();
const mm = Markmap.create('#mm', { color: getNodeColor, colorFreezeLevel: 0, initialExpandLevel: -1, maxWidth: 420, paddingX: 14 }, transformer.transform(getMd()).root);

// Active workpapers based on language
function getWorkpapers() { return curLang() === 'en' ? workpapers_en : workpapers_zh; }

// Workpaper panel labels (bilingual)
const wpLabels = {
  zh: { sourcesLabel: 'Sources:' },
  en: { sourcesLabel: 'Sources:' }
};

function showWorkpaper(text) {
  var decoded = decodeHtml(text.replace(/<[^>]*>/g,''));
  var workpapers = getWorkpapers();
  var labels = curLang() === 'en' ? wpLabels.en : wpLabels.zh;
  var found = null;
  for (var kw in workpapers) { if (decoded.includes(kw)) { found = workpapers[kw]; break; } }
  var panel = document.getElementById('wpanel');
  if (!found) { panel.style.display='none'; return; }
  var h = '<span class="wp-close" onclick="document.getElementById(\'wpanel\').style.display=\'none\'">&#x2715;</span>';
  if (found.structured) {
    h += '<div class="wp-title">'+found.claim+'</div>';
    h += '<div class="wp-verdict" style="padding:6px 8px;background:#f0f8f0;border-radius:4px">'+found.conclusion+'</div>';
    found.subclaims.forEach(function(sc,i){
      var bc = sc.status==='\u{1F7E2}'?'#009A44':sc.status==='\u{1F7E1}'?'#D4A843':'#CC0000';
      var did = 'sc'+i;
      h += '<div style="margin-top:8px;border-left:3px solid '+bc+';border-radius:4px">';
      h += '<div onclick="var e=document.getElementById(\''+did+'\');e.style.display=e.style.display===\'none\'?\'block\':\'none\'" style="cursor:pointer;padding:6px 8px;background:#f9f9f9;font-weight:600;font-size:11px">'+sc.status+' '+sc.text+' &#x25BC;</div>';
      h += '<div id="'+did+'" style="display:none;padding:6px 8px"><div class="wp-finding">'+sc.finding+'</div>';
      if(sc.quote) {
        h += '<div style="margin:6px 0;padding:6px 8px;background:#f5f5f0;border-left:2px solid #ccc;font-style:italic;font-size:10px;color:#555">'+sc.quote+'</div>';
      }
      if(sc.sources && sc.sources.length > 0) { h += '<div class="wp-label">'+labels.sourcesLabel+'</div>'; sc.sources.forEach(function(s){ h += '<div class="wp-src">&bull; '+(s.url?'<a href="'+s.url+'" target="_blank">'+s.title+'</a>':s.title)+' &mdash; <i>'+s.author+'</i></div>'; }); }
      h += '</div></div>';
    });
  } else {
    h += '<div class="wp-title">'+found.color+' '+found.claim+'</div>';
    h += '<div class="wp-finding">'+found.finding+'</div>';
    h += '<div class="wp-verdict">'+found.verdict+'</div>';
  }
  panel.innerHTML = h; panel.style.display = 'block';
}

// Attach click listeners after render
setTimeout(function(){ document.querySelectorAll('g.markmap-node').forEach(function(g){ g.style.cursor='pointer'; g.addEventListener('click',function(e){ var fo=g.querySelector('foreignObject'); if(fo)showWorkpaper(fo.innerHTML); e.stopPropagation(); }); }); },1500);

// ===== Language switch: re-render markmap =====
function reRenderForLang() {
  var newRoot = transformer.transform(getMd()).root;
  mm.setData(newRoot);
  setTimeout(function() { mm.fit(); }, 100);
  // Close workpaper panel on lang switch
  document.getElementById('wpanel').style.display = 'none';
  // Re-attach click listeners
  setTimeout(function(){
    document.querySelectorAll('g.markmap-node').forEach(function(g){
      g.style.cursor = 'pointer';
      g.addEventListener('click', function(e){
        var fo = g.querySelector('foreignObject');
        if(fo) showWorkpaper(fo.innerHTML);
        e.stopPropagation();
      });
    });
  }, 600);
}

// Override toggleLang from lang.js to also re-render markmap
var _origToggleLang = null;
var _langObserver = setInterval(function() {
  if (window.toggleLang && !_origToggleLang) {
    _origToggleLang = window.toggleLang;
    window.toggleLang = function() {
      _origToggleLang();
      reRenderForLang();
    };
    clearInterval(_langObserver);
  }
}, 100);
</script>
<script src="/investment/docs/lang.js"></script>
<script>
function curLang(){return localStorage.getItem('research-engine-lang')||'en'}

  if(lang==='en'){t1.innerHTML='<b>Click any colored node</b> on the map to open its verification workpaper';t2.innerHTML='In the workpaper panel, <b>click each sub-claim row</b> to expand evidence details';btn.textContent='Got it';}
  else{t1.innerHTML='<b>点击地图上任意彩色节点</b>，打开该节点的验证底稿';t2.innerHTML='在右侧底稿面板中，<b>点击每条子声明</b>可展开验证详情';btn.textContent='知道了';}
}
function dismissToast(){var t=document.getElementById('guideToast');if(t){t.style.opacity='0';t.style.pointerEvents='none';setTimeout(function(){t.remove()},400);}try{sessionStorage.setItem('verifyGuideShown','1')}catch(e){}}
if(sessionStorage.getItem('verifyGuideShown')){var _t=document.getElementById('guideToast');if(_t)_t.remove();}

initLang();
// After initLang, if saved lang differs from initial build, re-render markmap

  var lang = (localStorage.getItem('research-engine-lang') || 'en');
  reRenderForLang();
  applyGuideToastLang();
})();
</script>
