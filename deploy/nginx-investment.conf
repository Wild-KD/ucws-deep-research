# Investment Research Engine — Nginx reverse proxy snippet
# Add this inside the main www.askmbb.com server block in /etc/nginx/sites-available/askmbb
#
# Usage:
#   1. Edit /etc/nginx/sites-available/askmbb
#   2. Add this location block BEFORE the catch-all "location /" block
#   3. sudo nginx -t && sudo systemctl reload nginx

# Investment Research Engine → Python FastAPI on :9001
location /investment/ {
    proxy_pass http://127.0.0.1:9001/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket support (for real-time progress)
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Pipeline can run long
    proxy_read_timeout 1800s;
    proxy_send_timeout 1800s;

    # Allow large PDF uploads
    client_max_body_size 50M;
}
