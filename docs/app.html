<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investment Detective · Start Research</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#141417;--fg:#e8e8ed;
  --card-bg:rgba(255,255,255,0.025);--card-border:rgba(255,255,255,0.07);
  --accent:#d4a76a;--accent-dim:rgba(212,167,106,0.15);
  --t2:#a1a1aa;--t3:#71717a;--t4:#52525b;--t5:#3f3f46;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,-apple-system,'PingFang SC',sans-serif;background:var(--bg);color:var(--fg);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
body::before{content:'';position:fixed;top:-20%;left:50%;transform:translateX(-50%);width:80vw;height:50vh;background:radial-gradient(ellipse at center,rgba(212,167,106,0.03) 0%,transparent 70%);pointer-events:none;z-index:-1}

nav{padding:20px 24px;display:flex;align-items:center;gap:10px}
.brand-bar{width:2px;height:24px;background:linear-gradient(to bottom,#d4a76a,#b8894f);border-radius:1px}
nav span.bn{font-size:14px;font-weight:600}
nav em{font-style:normal;color:var(--accent)}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:14px}
.nav-right a{font-size:11px;color:var(--t3);text-decoration:none}
.nav-right a:hover{color:var(--accent)}

.main{flex:1;display:flex;align-items:center;justify-content:center;padding:0 24px}
.center-card{max-width:520px;width:100%;text-align:center}
.badge{display:inline-block;padding:4px 14px;border:1px solid rgba(212,167,106,0.25);border-radius:20px;font-size:11px;font-weight:500;color:var(--accent);margin-bottom:20px}
.center-card h1{font-size:32px;font-weight:200;letter-spacing:-0.02em;margin-bottom:12px}
.center-card h1 strong{font-weight:300;color:var(--accent)}
.center-card .desc{font-size:14px;color:var(--t3);line-height:1.7;margin-bottom:32px}
.center-card .desc b{color:var(--t2);font-weight:500}

.demo-cta{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;background:var(--accent);color:#000;font-size:14px;font-weight:500;border:none;border-radius:6px;text-decoration:none;transition:background 0.15s;cursor:pointer;font-family:inherit}
.demo-cta:hover{background:#dfb97e}
.or{font-size:12px;color:var(--t4);margin:16px 0}
.back-link{font-size:12px;color:var(--t3);text-decoration:none}
.back-link:hover{color:var(--accent)}

footer{padding:24px;text-align:center}
footer p{font-size:10px;color:var(--t4)}
</style>
</head>
<body>

<nav>
  <div class="brand-bar"></div>
  <span class="bn">Research<em>Engine</em></span>
  <div class="nav-right">
    <button id="langToggle" onclick="toggleLang()" style="border:1px solid var(--card-border);background:transparent;color:var(--t3);font-size:10px;padding:3px 10px;border-radius:3px;cursor:pointer;font-family:inherit">EN</button>
    <a href="/investment/" data-en="← Home">← 首页</a>
  </div>
</nav>

<div class="main">
  <div class="center-card">
    <div class="badge" data-en="Coming Soon">即将上线</div>
    <h1 data-en="Full Pipeline <strong>Coming Soon</strong>">完整管线<strong>即将上线</strong></h1>
    <div class="desc" data-en="The end-to-end investigation pipeline (upload reports → AI decomposes → verifies → merges → dashboard) is under development.<br><br>In the meantime, check out the <b>Silver Investment Case Demo</b> to see the full detective workflow in action.">
      端到端的侦探调查管线（上传研报 → AI 拆解 → 验证 → 合并 → 看板）正在开发中。<br><br>现在可以先查看<b>白银投资 Case Demo</b>，体验完整的六步侦探工作流。
    </div>
    <a class="demo-cta" href="/investment/docs/demo.html" data-en="View Silver Demo →">查看白银 Demo →</a>
    <div class="or" data-en="or">或</div>
    <a class="back-link" href="/investment/" data-en="← Back to homepage">← 返回首页</a>
  </div>
</div>

<footer>
  <p>Team KDLD · UCWS Singapore 2026 · MiroMind Deep Research</p>
</footer>

<script src="/investment/docs/lang.js"></script>
<script>
window.RESEARCH_TITLE_EN = 'Investment Detective · Start Research';
initLang();
</script>
</body>
</html>
