// Render with per-node color function
const { Transformer, Markmap } = window.markmap;
const transformer = new Transformer();

// Build color function: markmap calls color(node) for each branch
function decodeHtml(html) {
  var el = document.createElement('div');
  el.innerHTML = html;
  return el.textContent || el.innerText || '';
}

function findContent(obj, depth) {
  if (!obj || depth > 5) return '';
  if (typeof obj === 'string') return obj;
  if (obj.content) return obj.content;
  if (obj.v) return obj.v;
  if (obj.data) return findContent(obj.data, depth+1);
  return '';
}

function hasKids(obj) {
  if (!obj) return false;
  if (obj.children && obj.children.length > 0) return true;
  if (obj.data && obj.data.children && obj.data.children.length > 0) return true;
  return false;
}

function getNodeColor(node) {
  var rawContent = findContent(node, 0);
  var text = decodeHtml(rawContent.replace(/<[^>]*>/g, ''));

  // 常识 → always black
  if (text.includes('常识')) return B;

  // Check if this text matches any verified keyword (works for BOTH headings and leaves)
  for (const [kw, color] of verifyColors) {
    if (text.includes(kw)) return color;
  }

  // Fallback: has children but no keyword match → pure structural label → black
  if (hasKids(node)) return B;

  // Leaf with no match
  return Y;
}

function buildMarkmap(svgId, md) {
  const { root } = transformer.transform(md);
  return Markmap.create('#' + svgId, {
    color: getNodeColor,
    colorFreezeLevel: 0,
    initialExpandLevel: -1,
    maxWidth: 420,
    paddingX: 14
  }, root);
}

// Post-render: add borders matching line colors
function addBorders(svgId) {
  const svg = document.getElementById(svgId);
  if (!svg) return;
  svg.querySelectorAll('g.markmap-node').forEach(function(g) {
    const fo = g.querySelector('foreignObject');
    if (!fo) return;
    // Get the color from the circle (markmap renders a small circle per node)
    const circle = g.querySelector('circle');
    const color = circle ? circle.getAttribute('fill') : B;

    const w = parseFloat(fo.getAttribute('width')) || 150;
    const h = parseFloat(fo.getAttribute('height')) || 30;
    const x = parseFloat(fo.getAttribute('x')) || 0;
    const y = parseFloat(fo.getAttribute('y')) || 0;

    g.querySelectorAll('.v-border').forEach(e => e.remove());
    const border = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    border.setAttribute('class', 'v-border');
    border.setAttribute('x', x - 5);
    border.setAttribute('y', y - 5);
    border.setAttribute('width', w + 10);
    border.setAttribute('height', h + 10);
    border.setAttribute('rx', 6);
    border.setAttribute('ry', 6);
    border.setAttribute('fill', 'none');
    border.setAttribute('stroke', color);
    border.setAttribute('stroke-width', '2.5');
    g.insertBefore(border, g.firstChild);
  });
}

// Click handler: show workpaper on node click
function showWorkpaper(text) {
  var decoded = decodeHtml(text.replace(/<[^>]*>/g, ''));
  var found = null;
  for (var kw in workpapers) {
    if (decoded.includes(kw)) { found = workpapers[kw]; break; }
  }
  var panel = document.getElementById('wpanel');
  if (!found) { panel.style.display = 'none'; return; }

  var h = '<span class="wp-close" onclick="document.getElementById(\'wpanel\').style.display=\'none\'">✕</span>';

  if (found.structured) {
    // Structured multi-subclaim format
    h += '<div class="wp-title">' + found.claim + '</div>';
    h += '<div class="wp-verdict" style="margin:6px 0;padding:6px 8px;background:#f0f8f0;border-radius:4px">' + found.conclusion + '</div>';

    found.subclaims.forEach(function(sc, idx) {
      var borderColor = sc.status==='🟢'?'#009A44':sc.status==='🟡'?'#D4A843':'#CC0000';
      var detailId = 'sc-detail-' + idx;
      h += '<div style="margin-top:8px;border-left:3px solid ' + borderColor + ';border-radius:4px">';
      // Collapsible header
      h += '<div onclick="var el=document.getElementById(\'' + detailId + '\');el.style.display=el.style.display===\'none\'?\'block\':\'none\'" style="cursor:pointer;padding:6px 8px;background:#f9f9f9;font-weight:600;font-size:11px;display:flex;justify-content:space-between;align-items:center">';
      h += '<span>' + sc.status + ' ' + sc.text + '</span><span style="color:#999;font-size:9px">▼</span></div>';
      // Collapsible detail (default hidden)
      h += '<div id="' + detailId + '" style="display:none;padding:6px 8px">';
      h += '<div class="wp-finding" style="margin:4px 0">' + sc.finding + '</div>';
      if (sc.quote) {
        h += '<div style="margin:6px 0;padding:6px 8px;background:#f5f5f0;border-left:2px solid #ccc;font-style:italic;font-size:10px;color:#555">' + sc.quote + '</div>';
      }
      h += '<div class="wp-label">Sources:</div>';
      sc.sources.forEach(function(s) {
        h += '<div class="wp-src">';
        if (s.url) h += '• <a href="' + s.url + '" target="_blank">' + s.title + '</a>';
        else h += '• ' + s.title;
        h += ' — <i>' + s.author + '</i></div>';
      });
      h += '</div></div>';
    });
  } else {
    // Simple format
    h += '<div class="wp-title">' + found.color + ' ' + found.claim + '</div>';
    h += '<div class="wp-label">验证Sources:</div>';
    found.sources.forEach(function(s) { h += '<div class="wp-src">• ' + s + '</div>'; });
    h += '<div class="wp-label">验证发现:</div>';
    h += '<div class="wp-finding">' + found.finding + '</div>';
    h += '<div class="wp-label">结论:</div>';
    h += '<div class="wp-verdict">' + found.verdict + '</div>';
  }

  panel.innerHTML = h;
  panel.style.display = 'block';
}

// Attach click listeners after render
setTimeout(function(){
  document.querySelectorAll('g.markmap-node').forEach(function(g){
    g.style.cursor = 'pointer';
    g.addEventListener('click', function(e){
      var fo = g.querySelector('foreignObject');
      if(fo) showWorkpaper(fo.innerHTML);
      e.stopPropagation();
    });
  });
}, 1500);

let showK = true;
function toggleK() {
  showK = !showK;
  document.getElementById('toggleBtn').textContent = showK ? '常识: 显示中' : '常识: 已隐藏';
  document.getElementById('toggleBtn').classList.toggle('active', showK);
  // 同一个SVG，换数据重新渲染
  mm.setData(showK ? rootWithK : rootNoK);
  setTimeout(function() { mm.fit(); }, 100);
}
