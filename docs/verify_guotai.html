function decodeHtml(html) {
  var el = document.createElement('div');
  el.innerHTML = html;
  return el.textContent || el.innerText || '';
}

function findContent(obj, depth) {
  if (!obj || depth > 5) return '';
  if (typeof obj === 'string') return obj;
  if (obj.content) return obj.content;
  if (obj.v) return obj.v;
  if (obj.data) return findContent(obj.data, depth+1);
  return '';
}

function hasKids(obj) {
  if (!obj) return false;
  if (obj.children && obj.children.length > 0) return true;
  if (obj.data && obj.data.children && obj.data.children.length > 0) return true;
  return false;
}

  var text = decodeHtml(rawContent.replace(/<[^>]*>/g, ''));

  if (text.includes('常识') || text.includes('Knowledge')) return B;

  for (const [kw, color] of verifyColors) {
    try {
      if (kw.includes('.*') ? new RegExp(kw).test(text) : text.includes(kw)) return color;
    } catch(e) {
      if (text.includes(kw)) return color;
    }
  }

  if (hasKids(node)) return B;
  return Y;
}

function buildMarkmap(svgId, md) {
  const { root } = transformer.transform(md);
  return Markmap.create('#' + svgId, {
    color: getNodeColor,
    colorFreezeLevel: 0,
    initialExpandLevel: -1,
    maxWidth: 420,
    paddingX: 14
  }, root);
}

  return {
    rootWithK: transformer.transform(mkReorg(true)).root,

  };

// Active workpapers based on language
function getWorkpapers() { return curLang() === 'en' ? workpapers_en : workpapers_zh; }

// ===== Workpaper panel labels (bilingual) =====
const wpLabels = {
  zh: { sources: '验证Sources:', finding: '验证发现:', conclusion: '结论:', sourcesLabel: 'Sources:' },
  en: { sources: 'Verification Sources:', finding: 'Verification Finding:', conclusion: 'Conclusion:', sourcesLabel: 'Sources:' }
};

// Click handler: show workpaper on node click
function showWorkpaper(text) {
  var decoded = decodeHtml(text.replace(/<[^>]*>/g, ''));
  var workpapers = getWorkpapers();
  var labels = curLang() === 'en' ? wpLabels.en : wpLabels.zh;
  var found = null;
  for (var kw in workpapers) {
    if (decoded.includes(kw)) { found = workpapers[kw]; break; }
  }
  var panel = document.getElementById('wpanel');
  if (!found) { panel.style.display = 'none'; return; }

  var h = '<span class="wp-close" onclick="document.getElementById(\'wpanel\').style.display=\'none\'">&#x2715;</span>';

  if (found.structured) {
    h += '<div class="wp-title">' + found.claim + '</div>';
    h += '<div class="wp-verdict" style="margin:6px 0;padding:6px 8px;background:#f0f8f0;border-radius:4px">' + found.conclusion + '</div>';

    found.subclaims.forEach(function(sc, idx) {
      var borderColor = sc.status==='\u{1F7E2}'?'#009A44':sc.status==='\u{1F7E1}'?'#D4A843':'#CC0000';
      var detailId = 'sc-detail-' + idx;
      h += '<div style="margin-top:8px;border-left:3px solid ' + borderColor + ';border-radius:4px">';
      h += '<div onclick="var el=document.getElementById(\'' + detailId + '\');el.style.display=el.style.display===\'none\'?\'block\':\'none\'" style="cursor:pointer;padding:6px 8px;background:#f9f9f9;font-weight:600;font-size:11px;display:flex;justify-content:space-between;align-items:center">';
      h += '<span>' + sc.status + ' ' + sc.text + '</span><span style="color:#999;font-size:9px">&#x25BC;</span></div>';
      h += '<div id="' + detailId + '" style="display:none;padding:6px 8px">';
      h += '<div class="wp-finding" style="margin:4px 0">' + sc.finding + '</div>';
      if (sc.quote) {
        h += '<div style="margin:6px 0;padding:6px 8px;background:#f5f5f0;border-left:2px solid #ccc;font-style:italic;font-size:10px;color:#555">' + sc.quote + '</div>';
      }
      h += '<div class="wp-label">' + labels.sourcesLabel + '</div>';
      sc.sources.forEach(function(s) {
        h += '<div class="wp-src">';
        if (s.url) h += '&bull; <a href="' + s.url + '" target="_blank">' + s.title + '</a>';
        else h += '&bull; ' + s.title;
        h += ' &mdash; <i>' + s.author + '</i></div>';
      });
      h += '</div></div>';
    });
  } else {
    h += '<div class="wp-title">' + found.color + ' ' + found.claim + '</div>';
    h += '<div class="wp-label">' + labels.sources + '</div>';
    found.sources.forEach(function(s) { h += '<div class="wp-src">&bull; ' + s + '</div>'; });
    h += '<div class="wp-label">' + labels.finding + '</div>';
    h += '<div class="wp-finding">' + found.finding + '</div>';
    h += '<div class="wp-label">' + labels.conclusion + '</div>';
    h += '<div class="wp-verdict">' + found.verdict + '</div>';
  }

  panel.innerHTML = h;
  panel.style.display = 'block';
}

// Attach click listeners after render
setTimeout(function(){
  document.querySelectorAll('g.markmap-node').forEach(function(g){

      if(fo) showWorkpaper(fo.innerHTML);
      e.stopPropagation();
    });
  });
}, 1500);

  if (lang === 'en') {

  roots = getMarkmapRoots();
  mm.setData(showK ? roots.rootWithK : roots.rootNoK);
  setTimeout(function() { mm.fit(); }, 100);
}

    btn.textContent = showK ? btn.getAttribute('data-en-show') : btn.getAttribute('data-en-hide');
  } else {
    btn.textContent = showK ? btn.getAttribute('data-zh-show') : btn.getAttribute('data-zh-hide');
  }
  // Close workpaper panel on lang switch
  document.getElementById('wpanel').style.display = 'none';
  // Re-attach click listeners
  setTimeout(function(){
    document.querySelectorAll('g.markmap-node').forEach(function(g){
      g.style.cursor = 'pointer';
      g.addEventListener('click', function(e){
        var fo = g.querySelector('foreignObject');
        if(fo) showWorkpaper(fo.innerHTML);
        e.stopPropagation();
      });
    });
  }, 600);
}

// Override toggleLang from lang.js to also re-render markmap
var _origToggleLang = null;
var _langObserver = setInterval(function() {
  if (window.toggleLang && !_origToggleLang) {
    _origToggleLang = window.toggleLang;
    window.toggleLang = function() {
      _origToggleLang();
      reRenderForLang();
    };
    clearInterval(_langObserver);
  }
}, 100);
</script>
<script src="/investment/docs/lang.js"></script>
<script>
initLang();
// After initLang, update dynamic elements that lang.js cannot handle
(function(){
  var btn = document.getElementById('toggleBtn');
  var lang = (localStorage.getItem('research-engine-lang') || 'en');
  if (lang === 'en') {
    btn.textContent = showK ? btn.getAttribute('data-en-show') : btn.getAttribute('data-en-hide');
  }
  // If saved lang differs from what markmap was initially built with, re-render
  reRenderForLang();
})();
</script>
